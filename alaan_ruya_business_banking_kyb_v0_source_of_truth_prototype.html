<div class="assistant-bubble" onclick="showModal('Need help?', 'You can leave the form anytime. Your progress is auto-saved. Fields marked as pre-filled came from the Nymcard KYB application and can be edited if they are outdated.')"><div class="swirl">◎</div><div class="bars"><span></span><span></span><span></span></div></div>
<div class="toasts" id="toasts"></div>
<div id="modalRoot"></div>
<script>
const state={
  started:false, submitted:false, step:0, showErrors:false,
  initiator:{first:'Raj',last:'Pandey',email:'raj@brightlogistics.ae',mobile:'50 123 4567',role:'Shareholder',hasPoa:null,uaeCitizen:null,idChoice:'Emirates ID',eid:'',eidExpiry:'',passport:'',passportExpiry:'',idUpload:false,authorised:null,consent:false,signerName:'',signerEmail:'',signerPhone:'',proofMethod:'',proofUpload:false},
  company:{name:'Bright Logistics LLC',website:'brightlogistics.ae',email:'finance@brightlogistics.ae',phone:'+971 4 555 0199',turnover:'AED 3M–25M',trn:'100123456789',tlNo:'DED-CN-1234567',tlExpiry:'2026-03-14',opSame:null,opAddress:'',opCity:'',opCountry:'United Arab Emirates',activitiesAnswer:null},
  shareholders:[
    {kind:'individual',source:'Nymcard',name:'Raj Pandey',role:'Director & Shareholder',address:'Villa 12, Al Wasl Road, Dubai, UAE',uae:true,eid:'784-1991-1234567-1',eidExpiry:'2027-08-22',passport:'',passportExpiry:'',idUpload:true},
    {kind:'individual',source:'Nymcard',name:'Sara Al Mansouri',role:'Shareholder',address:'Villa 22, Jumeirah, Dubai, UAE',uae:true,eid:'784-1985-9876543-2',eidExpiry:'2028-05-10',passport:'',passportExpiry:'',idUpload:true}
  ],
  docs:{bank:false,poa:false,regQ:null,reg:false,parentQ:null,parent:false,foreignQ:null,inc:false,companyTl:false,moaUpdate:false,tlUpdate:false},
  docMeta:{bank:{name:'',uploadedAt:''},poa:{name:'',uploadedAt:''},reg:{name:'',uploadedAt:''},parent:{name:'',uploadedAt:''},inc:{name:'',uploadedAt:''},companyTl:{name:'',uploadedAt:''}},
  review:{declaration:false}
};
const steps=['Initiator details','Company details','Shareholders','Documents','Review application'];
const riskyActivities=[
  ['money','Money services, exchange or remittance','Currency exchange, remittance, payment processing or similar services.'],
  ['crypto','Crypto or virtual assets','Trading, exchange, custody or advisory around digital assets.'],
  ['realEstate','Real estate brokerage or development','Property broking, leasing, development, sales or related services.'],
  ['precious','Precious metals or stones','Gold, diamonds, jewellery or other high-value commodities.'],
  ['professional','Legal, accounting, trust or company services','Company formation, nominee, fiduciary, trust, legal or accounting services.'],
  ['charity','Charity, donations, NPO or religious organisation','Fundraising, charitable work, religious or non-profit activity.'],
  ['cash','Cash-intensive or frequent cross-border transfers','Frequent cash handling or regular international transfers.'],
  ['otherRisk','Other activity similar to the above','Choose this if your activity is similar but not listed here.']
];
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c]))}
function get(path){return path.split('.').reduce((o,k)=>o&&o[k],state)}
function set(path,val){setNoRender(path,val);render()}
function setNoRender(path,val){const p=path.split('.');let o=state;for(let i=0;i<p.length-1;i++)o=o[p[i]];o[p[p.length-1]]=val}
function empty(v){return v===null||v===undefined||String(v).trim()===''}
const booleanAnswerPaths=['initiator.uaeCitizen','initiator.authorised','initiator.hasPoa','company.opSame','company.activitiesAnswer','docs.regQ','docs.parentQ','docs.foreignQ'];
function filled(p){const v=get(p); if(booleanAnswerPaths.includes(p)) return v===true||v===false; if(typeof v==='boolean') return v===true; return !empty(v)}
function isHighRisk(){return state.company.activitiesAnswer===true}
function threshold(){return isHighRisk()?10:25}
function isAuthorisedSignatory(){return state.initiator.role==='Authorised Signatory'}
function hasPoaAuthority(){return (state.initiator.role==='Shareholder'||state.initiator.role==='Employee') && state.initiator.hasPoa===true}
function usesRoutedConsent(){return (state.initiator.role==='Shareholder'||state.initiator.role==='Employee') && state.initiator.hasPoa===false}
function directConsentPath(){return isAuthorisedSignatory()||hasPoaAuthority()}
function consentPathLabel(){return isAuthorisedSignatory()?'Direct AS':hasPoaAuthority()?'POA holder':'Routed to AS'}
function hasCompanyShareholder(){return state.shareholders.some(s=>s.kind==='company')}
function toast(msg,warn=false){const t=document.createElement('div');t.className='toast'+(warn?' warn':'');t.innerHTML=msg;document.getElementById('toasts').appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(18px)';setTimeout(()=>t.remove(),230)},3500)}
function showModal(title,body){document.getElementById('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>${title}</h3><p>${body}</p><div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">Got it</button></div></div></div>`}
function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function badge(t,c){return `<span class="badge ${c}">${t}</span>`}
function sectionProgress(done,total){const pct=total?Math.round(done/total*100):100;return `<div class="section-progress"><div class="sub-progress-row"><span><strong>${done}/${total}</strong> required items complete</span><span>${pct}%</span></div><div class="sub-progress"><span style="width:${pct}%"></span></div></div>`}
function field({label,path,type='text',required=false,prefill=false,placeholder='',hint='',options=[],prefix='',full=false}){const v=get(path);let input='';const cls=(prefill?'prefill ':'');if(type==='select'){input=`<select class="${cls}" onchange="set('${path}',this.value)"><option value="">Select</option>${options.map(o=>`<option value="${esc(o)}" ${v===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`}else if(type==='textarea'){input=`<textarea class="${cls}" placeholder="${esc(placeholder)}" oninput="setNoRender('${path}',this.value)">${esc(v)}</textarea>`}else{input=`<input class="${cls}" type="${type}" placeholder="${esc(placeholder)}" value="${esc(v)}" oninput="setNoRender('${path}',this.value)">`}if(prefix){input=`<div class="input-wrap"><div class="input-prefix">${prefix}</div>${input}</div>`}const flags=`<span class="label-flags">${prefill?'<span class="pill-note">Nymcard</span>':''}${required?'<span class="need-flag">Required</span>':''}</span>`;return `<div class="field ${full?'full':''}"><label><span class="label-left">${label}</span>${flags}</label>${input}${hint?`<div class="hint">${hint}</div>`:''}</div>`}
function toggleButtons(path,yesText,noText,onYes='',onNo=''){const v=get(path);return `<div class="toggle"><button type="button" class="${v===true?'active':''}" onclick="${onYes||`set('${path}',true)`}">${yesText}</button><button type="button" class="${v===false?'active':''}" onclick="${onNo||`set('${path}',false)`}">${noText}</button></div>`}
function upload(id,title,meta,done=false){
  const m=state.docMeta&&state.docMeta[id]||{};
  const uploadedName=m.name||'Uploaded successfully';
  return `<div class="upload ${done?'done':''}" onclick="${done?`viewNewDoc('${id}','${esc(title)}')`:`uploadClick('${id}')`}"><div class="plus">${done?'✓':'+'}</div><div><div class="u-title">${title}</div><div class="u-meta">${done?uploadedName:meta}</div></div>${done?`<div class="upload-actions" onclick="event.stopPropagation()"><button onclick="viewNewDoc('${id}','${esc(title)}')">View</button><button class="secondary" onclick="deleteUpload('${id}')">Delete</button><button onclick="uploadClick('${id}')">Re-upload</button></div>`:''}</div>`
}
function markDocMeta(id){
  if(!state.docMeta)state.docMeta={};
  state.docMeta[id]={name:'new_'+id+'_document.pdf',uploadedAt:new Date().toLocaleDateString('en-GB')};
}
function viewNewDoc(id,title){
  const m=state.docMeta&&state.docMeta[id]||{};
  showModal('View document', `<strong>${title}</strong><br><br>${m.name||'Document uploaded'}<br>Uploaded: ${m.uploadedAt||'Today'}<br><br>Initiators and admins can view uploaded documents from this section.`)
}
function deleteUpload(id){
  if(id==='proof')state.initiator.proofUpload=false;
  if(id==='initiatorId')state.initiator.idUpload=false;
  if(id==='bank')state.docs.bank=false;if(id==='poa')state.docs.poa=false;if(id==='reg')state.docs.reg=false;if(id==='parent')state.docs.parent=false;if(id==='inc')state.docs.inc=false;if(id==='companyTl')state.docs.companyTl=false;
  if(state.docMeta&&state.docMeta[id])state.docMeta[id]={name:'',uploadedAt:''};
  toast('Document removed. You can re-upload anytime.',true);render();
}
function uploadClick(id){
  if(id==='proof')state.initiator.proofUpload=true;
  if(id==='initiatorId')state.initiator.idUpload=true;
  if(id==='bank'){state.docs.bank=true;markDocMeta('bank')}if(id==='poa'){state.docs.poa=true;markDocMeta('poa')}if(id==='reg'){state.docs.reg=true;markDocMeta('reg')}if(id==='parent'){state.docs.parent=true;markDocMeta('parent')}if(id==='inc'){state.docs.inc=true;markDocMeta('inc')}if(id==='companyTl'){state.docs.companyTl=true;markDocMeta('companyTl')}if(id==='tlUpdate')state.docs.tlUpdate=true;if(id==='moaUpdate')state.docs.moaUpdate=true;
  if(id.startsWith('id')){const i=parseInt(id.slice(2),10);state.shareholders[i].idUpload=true}
  if(id.startsWith('coTl')){const i=parseInt(id.slice(4),10);state.shareholders[i].tlUploaded=true;state.docs.companyTl=true;markDocMeta('companyTl')}
  toast('Uploaded ✓');render();
}
function viewExistingDoc(title,sub,status){
  const statusText=status==='expired'?'Expired and must be replaced before final processing.':status==='expiring'?'Approaching expiry. We will notify the user, but update is not mandatory until it expires.':'Available from Nymcard.';
  showModal('Document metadata', `<strong>${title}</strong><br><br>${sub}<br><br>${statusText}<br><br>Nymcard-carried documents are shown as metadata only in this MVP. No preview or download is exposed. If a newer file is uploaded, both versions are retained and the Ruya upload becomes the current source of truth.`)
}

function updateExistingDoc(id,title){
  if(id==='tl')state.docs.tlUpdate=true;
  if(id==='moa')state.docs.moaUpdate=true;
  if(id.startsWith('id')){const i=parseInt(id.slice(2),10); if(state.shareholders[i]){state.shareholders[i].idUpload=true;state.shareholders[i].docUpdated=true;}}
  toast(`${title} updated in Documents & Certificates ✓`);render();
}

function requiredForStep(step){
  if(step===0){
    const a=['initiator.first','initiator.last','initiator.email','initiator.mobile','initiator.role','initiator.uaeCitizen'];
    if(state.initiator.uaeCitizen===true){
      a.push('initiator.idChoice');
      if(state.initiator.idChoice==='Passport') a.push('initiator.passport','initiator.passportExpiry','initiator.idUpload');
      else a.push('initiator.eid','initiator.eidExpiry','initiator.idUpload');
    }
    if(state.initiator.uaeCitizen===false){
      a.push('initiator.passport','initiator.passportExpiry','initiator.idUpload');
    }
    if(isAuthorisedSignatory())a.push('initiator.proofMethod','initiator.proofUpload');
    if(state.initiator.role==='Shareholder'||state.initiator.role==='Employee'){
      a.push('initiator.hasPoa');
      if(state.initiator.hasPoa===false)a.push('initiator.signerName','initiator.signerEmail','initiator.signerPhone','initiator.proofMethod','initiator.proofUpload');
    }
    return a
  }
  if(step===1){
    const a=['company.name','company.website','company.email','company.phone','company.turnover','company.tlNo','company.tlExpiry','company.opSame','company.activitiesAnswer'];
    if(state.company.opSame===false)a.push('company.opAddress','company.opCity','company.opCountry');
    return a
  }
  if(step===2){let a=[];state.shareholders.forEach((s,i)=>{a.push(`shareholders.${i}.name`,`shareholders.${i}.role`,`shareholders.${i}.address`);if(s.kind==='individual'){a.push(`shareholders.${i}.uae`);if(s.uae){a.push(`shareholders.${i}.eid`,`shareholders.${i}.eidExpiry`,`shareholders.${i}.idUpload`)}else{a.push(`shareholders.${i}.passport`,`shareholders.${i}.passportExpiry`,`shareholders.${i}.idUpload`)}}else{a.push(`shareholders.${i}.companyCountry`,`shareholders.${i}.companyType`,`shareholders.${i}.tlNo`,`shareholders.${i}.tlUploaded`)}});return a}
  if(step===3){const a=['docs.bank','docs.regQ','docs.parentQ'];if(hasPoaAuthority())a.push('docs.poa');if(state.docs.regQ===true)a.push('docs.reg');if(state.docs.parentQ===true)a.push('docs.parent','docs.foreignQ');if(state.docs.foreignQ===true)a.push('docs.inc');if(hasCompanyShareholder())a.push('docs.companyTl');return a}
  if(step===4){const a=['review.declaration']; if(directConsentPath())a.push('initiator.consent'); return a}
  return []
}

function completeForStep(step){const req=requiredForStep(step);let done=0;req.forEach(p=>{if(filled(p))done++});return [done,req.length]}
function validStep(step){const req=requiredForStep(step);const missing=req.filter(p=>!filled(p)).length;state.showErrors=false;if(missing){toast('You can continue. Missing required items will stay flagged for review.',true)}return true}
function startForm(){state.started=true;state.step=0;toast('Great — we pre-filled what we could from Nymcard.');render();window.scrollTo({top:0,behavior:'smooth'})}
function render(){document.getElementById('footer').style.display=state.started&&!state.submitted?'flex':'none';document.getElementById('main').innerHTML=state.submitted?doneView():(state.started?flowView():dashboardView());if(state.started&&!state.submitted)updateNav()}
function dashboardView(){return `<div class="dashboard"><div class="dash-title"><h1>Welcome to Alaan, Raj Pandey!</h1><p>You're all set to start exploring...</p></div><div class="start-banner"><div class="start-banner-main"><div class="start-title"><div class="start-ico">🏦</div><div><h2>Start Ruya Business Banking <span class="start-pill">Nymcard customer</span></h2><p>Most company and stakeholder details are already on file. We’ll only ask for the missing items and your approval.</p></div></div><button class="banner-button" onclick="startForm()">Start application</button></div><div class="reward-strip"><div><strong>Your business account is waiting.</strong> Complete verification to start business banking through Ruya.</div><button class="mini-link" onclick="showModal('MVP source-of-truth flow', 'Business Account states: Pre-KYB, In-progress, Awaiting AS consent, Submitted under verification, and Verified. Admin initiator can continue the application; Org Admins can override and edit; Accountants see a disabled CTA with eligible Admin names. The form itself stays focused on Nymcard prefill, missing Ruya fields, documents, consent and review.')">See what we’ll ask ↗</button></div></div><div style="margin-top:34px;display:flex;align-items:center;gap:10px"><h2 style="margin:0;font-size:22px;letter-spacing:-.04em">What you can do after approval</h2><span class="badge nym">quick tour</span></div><div class="dash-grid"><div class="tour-card"><div class="tour-img"></div><div class="tour-body"><h3>Start business banking</h3><p>Get your Ruya business account connected with your Alaan workspace.</p><button class="take-tour" onclick="startForm()">Start now »</button></div></div><div class="tour-card"><div class="tour-img"></div><div class="tour-body"><h3>Keep cards and banking together</h3><p>Use your existing company profile to reduce duplicate onboarding work.</p><button class="take-tour" onclick="showModal('Less duplicate work', 'Where details are already present in Nymcard, we show them back to you instead of asking you to type them again.')">Take a tour »</button></div></div><div class="tour-card"><div class="tour-img"></div><div class="tour-body"><h3>Review before submission</h3><p>Nothing is sent until you review the application and confirm consent.</p><button class="take-tour" onclick="showModal('Review page included', 'The final page summarises initiator, company, shareholder and document details with edit links for each section.')">Take a tour »</button></div></div></div></div>`}
function flowView(){return `<div class="flow-main"><div class="flow-shell"><div class="flow-top"><span class="flow-title" id="flowTitle"></span><button class="mini-link" onclick="showModal('Auto-save', 'Your draft is saved as you move through the form. You can continue later from the same banner.')">Auto-saved</button><span class="save">Draft saved</span></div><div class="stepper-card"><div class="stepper">${steps.map((s,i)=>stepNode(s,i)).join('')}</div><div class="overall-row"><div class="overall-fill" id="overallFill"></div></div></div><div class="notice" style="margin:0 0 14px"><strong>No hard stops in this prototype.</strong> Required items are shown as small flags, but you can move ahead and review missing items later.</div><div class="form-card" id="card">${[stepInitiator,stepCompany,stepShareholders,stepDocuments,stepReview][state.step]()}</div></div></div>`}
function stepNode(label,i){const [d,t]=completeForStep(i);const pct=t?Math.round(d/t*100):100;const active=state.step===i;const done=pct===100;const safeClick=`onclick="state.step=${i};state.showErrors=false;render();window.scrollTo({top:0,behavior:'smooth'})"`;return `<button class="step-node ${active?'active':''} ${done?'done':''}" ${safeClick}><span class="step-circle" style="--pct:${pct}"><span>${pct}%</span></span><span class="step-label">${label}</span></button>`}
function updateNav(){const totalPct=Math.round(steps.reduce((sum,_,i)=>{const [d,t]=completeForStep(i);return sum+(t?d/t:1)},0)/steps.length*100);document.getElementById('overallFill').style.width=totalPct+'%';document.getElementById('flowTitle').textContent=steps[state.step];document.getElementById('backBtn').style.visibility=state.step===0?'hidden':'visible';document.getElementById('nextBtn').textContent=state.step===steps.length-1?'Submit application':'Next'}
function back(){if(state.step>0){state.showErrors=false;state.step--;render();window.scrollTo({top:0,behavior:'smooth'})}}
function next(){if(state.submitted)return;validStep(state.step);state.showErrors=false;if(state.step<steps.length-1){state.step++;render();window.scrollTo({top:0,behavior:'smooth'});return}state.submitted=true;render();confetti()}
function setAuthorised(v){state.initiator.authorised=v;if(!v)state.initiator.consent=false;render();if(v)toast('Please add your authorisation document, then tick the consent box.');else toast('We will collect the signatory details and proof instead.',true)}
function setRelationship(v){
  state.initiator.role=v;
  state.initiator.authorised=(v==='Authorised Signatory');
  state.initiator.hasPoa=null;
  state.initiator.consent=false;
  if(v==='Authorised Signatory')toast('Consent will be collected inside this form.');
  render();
}
function setPoa(v){
  state.initiator.hasPoa=v;
  state.initiator.authorised=v===true;
  state.initiator.consent=false;
  if(v===true)toast('We will ask for the POA document in the Documents step.');
  else showModal('Consent will be routed', 'We will collect the authorised signatory details now. After you submit, the authorised signatory must give consent before the application is sent to Ruya.');
  render();
}

function setInitiatorCitizen(v){state.initiator.uaeCitizen=v;state.initiator.idUpload=false;if(v===true){state.initiator.idChoice=state.initiator.idChoice||'Emirates ID';state.initiator.passport='';state.initiator.passportExpiry=''}else{state.initiator.idChoice='Passport';state.initiator.eid='';state.initiator.eidExpiry=''}render()}
function setInitiatorIdChoice(choice){state.initiator.idChoice=choice;state.initiator.idUpload=false;if(choice==='Passport'){state.initiator.eid='';state.initiator.eidExpiry=''}else{state.initiator.passport='';state.initiator.passportExpiry=''}render()}
function stepInitiator(){
  const [d,t]=completeForStep(0);
  const idIsPassport=state.initiator.uaeCitizen===false || state.initiator.idChoice==='Passport';
  const relationshipBlock = `
    <div class="group"><div class="group-head"><h3>Your relationship with the company</h3>${badge('Required','req')}</div>
      <p class="micro">Choose the option that best describes you. This decides whether consent is captured in this form or routed to an authorised signatory.</p>
      <div class="grid one">
        <div class="field"><label><span class="label-left">Relationship with the company</span><span class="label-flags"><span class="need-flag">Required</span></span></label>
          <select onchange="setRelationship(this.value)"><option value="">Select</option>${['Authorised Signatory','Shareholder','Employee'].map(o=>`<option value="${o}" ${state.initiator.role===o?'selected':''}>${o}</option>`).join('')}</select>
        </div>
      </div>
      ${(state.initiator.role==='Shareholder'||state.initiator.role==='Employee')?`<div class="shade-box"><div class="group-head"><h3>Do you have a Power of Attorney from the company?</h3>${badge('Required','req')}</div><p class="micro" style="margin-top:0">If yes, upload the POA in the Documents step. If no, tell us who the authorised signatory is so we can collect their consent.</p><div class="toggle"><button class="${state.initiator.hasPoa===true?'active':''}" onclick="setPoa(true)">Yes, I have POA</button><button class="${state.initiator.hasPoa===false?'active':''}" onclick="setPoa(false)">No, route to AS</button></div></div>`:''}
    </div>`;
  const identityBlock = state.initiator.uaeCitizen===null ? '' : `
    <div class="shade-box">
      ${state.initiator.uaeCitizen===true?`<div class="group-head"><h3>Choose one identity document</h3>${badge('Required','req')}</div><p class="micro" style="margin-top:0">Emirates ID and passport are separate paths. Pick one, and we will only ask for that document.</p><div class="toggle"><button class="${state.initiator.idChoice==='Emirates ID'?'active':''}" onclick="setInitiatorIdChoice('Emirates ID')">Emirates ID</button><button class="${state.initiator.idChoice==='Passport'?'active':''}" onclick="setInitiatorIdChoice('Passport')">Passport</button></div>`:''}
      ${state.initiator.uaeCitizen===false?`<p class="micro" style="margin-top:0">Since you selected No, we only need your passport details here.</p>`:''}
      <div class="grid" style="margin-top:14px">
        ${idIsPassport?field({label:'Passport number',path:'initiator.passport',required:true,placeholder:'Enter passport number'}):field({label:'Emirates ID number',path:'initiator.eid',required:true,placeholder:'784-XXXX-XXXXXXX-X',hint:'15 digits starting with 784.'})}
        ${idIsPassport?field({label:'Passport expiry date',path:'initiator.passportExpiry',type:'date',required:true}):field({label:'Emirates ID expiry date',path:'initiator.eidExpiry',type:'date',required:true})}
        <div class="field full"><label><span class="label-left">Upload ${idIsPassport?'passport':'Emirates ID'}<span class="req-star">*</span></span>${state.initiator.idUpload?badge('Uploaded','done'):badge('Required','req')}</label>${upload('initiatorId',`Upload ${idIsPassport?'passport copy':'Emirates ID front and back'}`,'PNG, JPG or PDF · max 20 MB',state.initiator.idUpload)}</div>
      </div>
    </div>`;
  const authProofBlock = isAuthorisedSignatory()?`
    <div class="shade-box">
      <div class="group-head"><h3>Authorisation document</h3>${badge('Required','req')}</div>
      <p class="micro" style="margin-top:0">Upload one document that shows you can open or operate the account for the company.</p>
      <div class="grid">
        ${field({label:'Document type',path:'initiator.proofMethod',type:'select',required:true,options:['MOA / AOA names me as signatory','Board Resolution','Authorised signatory list / company letter','Other company approval document']})}
        <div class="field full"><label><span class="label-left">Upload authorisation document<span class="req-star">*</span></span>${state.initiator.proofUpload?badge('Uploaded','done'):badge('Required','req')}</label>${upload('proof','Upload authorisation document','PDF or image · your name should be visible',state.initiator.proofUpload)}</div>
      </div>
    </div>
    <label class="consent"><input type="checkbox" ${state.initiator.consent?'checked':''} onchange="set('initiator.consent',this.checked)"><span>I confirm that I am the authorised signatory for ${esc(state.company.name)} and I consent to opening a Ruya Business Banking account.</span></label>`:'';
  const poaNote = hasPoaAuthority()?`<div class="notice success"><strong>POA path selected.</strong> We will ask for the POA document in the Documents step, then collect your consent on the Review page.</div>`:'';
  const routedBlock = usesRoutedConsent()?`<div class="admin-box"><div class="inner-line"></div><p class="micro" style="margin-top:0">Share the authorised signatory details. Consent will be shown as a popup to the AS on their next Alaan session. If they are not already an Alaan user, Ops will onboard them as an Organisation Admin for MVP.</p><div class="grid">${field({label:'Authorised signatory name',path:'initiator.signerName',required:true,placeholder:'Full name'})}${field({label:'Authorised signatory work email',path:'initiator.signerEmail',type:'email',required:true,placeholder:'name@company.com'})}${field({label:'Authorised signatory mobile number',path:'initiator.signerPhone',required:true,prefix:'+971',placeholder:'50 000 0000'})}${field({label:'How will you prove they are the signatory?',path:'initiator.proofMethod',type:'select',required:true,options:['MOA / AOA names them as signatory','Board Resolution','Power of Attorney','Authorised signatory list / company letter','Other company approval document']})}<div class="field full"><label><span class="label-left">Upload authorisation document<span class="req-star">*</span></span>${state.initiator.proofUpload?badge('Uploaded','done'):badge('Required','req')}</label>${upload('proof','Upload authorisation document','PDF or image · clearly show the authorised signatory name',state.initiator.proofUpload)}</div></div></div>`:'';
  return `<section class="form-section"><div class="section-title"><div><h1>First, tell us who is opening this account</h1><p>We found most of this from your Nymcard profile. Please check it once and answer the authorisation question.</p></div><button class="btn btn-ghost" onclick="showModal('Source-of-truth rule','Relationship must be one of: Authorised Signatory, Shareholder, or Employee. Shareholder and Employee users are asked whether they have POA. If they do not, consent is routed to the authorised signatory before the application goes to Ruya.')">Rules</button></div>${sectionProgress(d,t)}<div class="group"><div class="group-head"><h3>Your details</h3>${badge('From Nymcard','nym')}</div><p class="micro">These are pre-filled so you do not have to type them again. Edit only if something has changed.</p><div class="grid">${field({label:'First name',path:'initiator.first',required:true,prefill:true})}${field({label:'Last name',path:'initiator.last',required:true,prefill:true})}${field({label:'Work email',path:'initiator.email',type:'email',required:true,prefill:true})}${field({label:'Mobile number',path:'initiator.mobile',required:true,prefix:'+971',prefill:true})}</div></div><hr class="divider">${relationshipBlock}<hr class="divider"><div class="group"><div class="group-head"><h3>Identity document</h3>${badge('Required','req')}</div><p class="micro">This helps Ruya confirm the person starting the application. Tell us if you are a UAE citizen, then upload one identity document.</p><div class="shade-box"><div class="group-head"><h3>Are you a UAE citizen?</h3>${badge('Required','req')}</div><div class="toggle"><button class="${state.initiator.uaeCitizen===true?'active':''}" onclick="setInitiatorCitizen(true)">Yes</button><button class="${state.initiator.uaeCitizen===false?'active':''}" onclick="setInitiatorCitizen(false)">No</button></div></div>${identityBlock}</div><hr class="divider"><div class="group"><div class="group-head"><h3>Consent and authority</h3>${badge('Required','req')}</div><p class="micro">Consent is required before the application can be sent to Ruya. The path depends on your relationship and POA answer.</p>${authProofBlock}${poaNote}${routedBlock}${!state.initiator.role?'<div class="notice warn">Select your relationship above to see the consent path.</div>':''}</div></section>`
}

function setActivityAnswer(v){state.company.activitiesAnswer=v;render();toast(v?'Next step will ask for shareholders with 10% or more.':'Next step will ask for shareholders with 25% or more.',v)}
function stepCompany(){
  const [d,t]=completeForStep(1);
  const activityPreview=riskyActivities.map(a=>`<div class="activity-card" style="cursor:default"><div><div class="a-title">${esc(a[1])}</div><div class="a-sub">${esc(a[2])}</div></div></div>`).join('');
  const answerCopy=state.company.activitiesAnswer===true?'You answered Yes. The shareholder step will ask for people or companies with 10% or more.':state.company.activitiesAnswer===false?'You answered No. The shareholder step will ask for people or companies with 25% or more.':'Answer this once to set the shareholder threshold in the next step.';
  return `<section class="form-section"><div class="section-title"><div><h1>Company details</h1><p>Most company information came from Nymcard. Please review it and answer two quick questions.</p></div>${badge('Low effort','nym')}</div>${sectionProgress(d,t)}<div class="group"><div class="group-head"><h3>Company information</h3>${badge('From Nymcard','nym')}</div><p class="micro">We show these fields so the application is transparent. Edit only if the data is stale.</p><div class="grid">${field({label:'Company name',path:'company.name',required:true,prefill:true})}${field({label:'Company website',path:'company.website',required:true,prefill:true})}${field({label:'Corporate email',path:'company.email',type:'email',required:true,prefill:true})}${field({label:'Corporate phone',path:'company.phone',required:true,prefill:true})}${field({label:'Annual turnover band',path:'company.turnover',required:true,prefill:true})}${field({label:'Tax Registration Number',path:'company.trn',prefill:true,hint:'Optional if not available.'})}${field({label:'Trade licence number',path:'company.tlNo',required:true,prefill:true})}${field({label:'Trade licence expiry',path:'company.tlExpiry',type:'date',required:true,prefill:true,hint:'Should be valid for at least three months.'})}</div></div><hr class="divider"><div class="group"><div class="group-head"><h3>Operating address</h3>${badge('Quick question','req')}</div><p class="micro">Is the place where you actually run the business the same as the address on the trade licence?</p>${toggleButtons('company.opSame','Yes, same address','No, different address')}${state.company.opSame===false?`<div class="shade-box"><div class="grid">${field({label:'Operating address',path:'company.opAddress',required:true,placeholder:'Office / building / street',full:true})}${field({label:'City',path:'company.opCity',required:true,placeholder:'Dubai'})}${field({label:'Country',path:'company.opCountry',required:true,options:['United Arab Emirates','Saudi Arabia','Qatar','Kuwait','Bahrain','Oman'],type:'select'})}</div></div>`:''}</div><hr class="divider"><div class="group"><div class="group-head"><h3>Business activity check</h3>${badge('Sets shareholder step','new')}</div><p class="micro">Read the list below, then answer one Yes/No question. You do not need to choose a main activity here.</p><div class="shade-box"><div class="group-head"><h3>Does your company do any of these activities?</h3>${badge('Review list','info')}</div><div class="activity-grid">${activityPreview}</div></div><div class="shade-box"><div class="group-head"><h3>Do any of the activities above apply to your company?</h3>${badge('Required','req')}</div><div class="toggle"><button class="${state.company.activitiesAnswer===true?'active':''}" onclick="setActivityAnswer(true)">Yes</button><button class="${state.company.activitiesAnswer===false?'active':''}" onclick="setActivityAnswer(false)">No</button></div>${state.showErrors&&state.company.activitiesAnswer===null?'<div class="field"><div class="err">This answer is required later</div></div>':''}<div class="threshold-card ${isHighRisk()?'high':''}"><div class="threshold-number">${threshold()}%</div><div class="threshold-copy"><strong>Shareholder threshold for the next step</strong>${answerCopy}</div></div></div></div></section>`
}
function shareholderCard(s,i){return `<div class="people-card"><div class="people-head"><div><h3>${s.name||'New stakeholder'} ${badge(s.source==='Nymcard'?'From Nymcard':'New','nym')}</h3><div class="hint">Use this card for anyone who meets the ${threshold()}%+ threshold, or is a director / signatory.</div></div><div class="mini-actions"><button class="icon-btn" onclick="state.shareholders.splice(${i},1);render();toast('Stakeholder removed')">Remove</button></div></div><div class="kind-tabs"><button class="${s.kind==='individual'?'active':''}" onclick="state.shareholders[${i}].kind='individual';render()">Individual</button><button class="${s.kind==='company'?'active':''}" onclick="state.shareholders[${i}].kind='company';render()">Company</button></div>${s.kind==='individual'?individualShareholderBlock(s,i):companyShareholderFields(s,i)}</div>`}
function individualShareholderBlock(s,i){return `<div class="grid">${field({label:'Full name',path:`shareholders.${i}.name`,required:true,prefill:s.source==='Nymcard'})}${field({label:'Role',path:`shareholders.${i}.role`,type:'select',required:true,prefill:s.source==='Nymcard',options:['Director','Shareholder','Director & Shareholder','Authorised Signatory','General Manager','Power of Attorney Holder']})}${field({label:'Residential address',path:`shareholders.${i}.address`,required:true,prefill:s.source==='Nymcard',full:true})}</div><div class="shade-box"><div class="group-head"><h3>Is this person a UAE resident?</h3>${badge('Changes ID document','cond')}</div><div class="toggle"><button class="${s.uae===true?'active':''}" onclick="state.shareholders[${i}].uae=true;render()">Yes</button><button class="${s.uae===false?'active':''}" onclick="state.shareholders[${i}].uae=false;state.shareholders[${i}].idUpload=false;render()">No</button></div><div style="margin-top:14px">${s.uae?idBlock(s,i):passportBlock(s,i)}</div></div>`}
function idBlock(s,i){return `<div class="grid">${field({label:'Emirates ID number',path:`shareholders.${i}.eid`,required:true,prefill:s.source==='Nymcard',placeholder:'784-XXXX-XXXXXXX-X'})}${field({label:'Emirates ID expiry date',path:`shareholders.${i}.eidExpiry`,type:'date',required:true,prefill:s.source==='Nymcard'})}<div class="field full"><label><span class="label-left">Emirates ID upload<span class="req-star">*</span></span>${s.idUpload?badge('On file','done'):''}</label>${upload('id'+i,'Click to upload Emirates ID','Front and back · PNG or PDF · Max 20 MB',s.idUpload)}</div></div>`}
function passportBlock(s,i){return `<div class="grid">${field({label:'Passport number',path:`shareholders.${i}.passport`,required:true,prefill:s.source==='Nymcard',placeholder:'Enter passport number'})}${field({label:'Passport expiry date',path:`shareholders.${i}.passportExpiry`,type:'date',required:true,prefill:s.source==='Nymcard'})}<div class="field full"><label><span class="label-left">Passport upload<span class="req-star">*</span></span>${s.idUpload?badge('On file','done'):badge('Authenticated copy','cond')}</label>${upload('id'+i,'Click to upload authenticated passport','Notarised/apostilled copy where required · PDF/image',s.idUpload)}</div></div>`}
function companyShareholderFields(s,i){return `<div class="notice warn"><strong>Company shareholder.</strong> For MVP, we collect the direct company shareholder only. Nested sub-shareholders are deferred.</div><div class="grid">${field({label:'Company shareholder name',path:`shareholders.${i}.name`,required:true,placeholder:'Company name'})}${field({label:'Company country',path:`shareholders.${i}.companyCountry`,type:'select',required:true,options:['United Arab Emirates','Saudi Arabia','United Kingdom','India','United States','Other']})}${field({label:'Company type',path:`shareholders.${i}.companyType`,type:'select',required:true,options:['LLC','Free Zone Company','Offshore Company','Branch','Public Joint Stock Company','Private Joint Stock Company','Other']})}${field({label:'Trade licence number',path:`shareholders.${i}.tlNo`,required:true,placeholder:'Enter licence / registration no.'})}${field({label:'Company address',path:`shareholders.${i}.address`,required:true,full:true,placeholder:'Registered address'})}<div class="field full"><label><span class="label-left">Company shareholder trade licence<span class="req-star">*</span></span>${s.tlUploaded?badge('Uploaded','done'):badge('Conditional','cond')}</label>${upload('coTl'+i,'Upload company shareholder trade licence','PDF/image · used only when a shareholder is a company',s.tlUploaded||state.docs.companyTl)}</div></div>`}
function addShareholder(){state.shareholders.push({kind:'individual',source:'New',name:'',role:'Shareholder',address:'',uae:true,eid:'',eidExpiry:'',passport:'',passportExpiry:'',idUpload:false});toast('New stakeholder card added');render();setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}),80)}
function stepShareholders(){const [d,t]=completeForStep(2);return `<section class="form-section"><div class="section-title"><div><h1>Shareholders & directors</h1><p>Add everyone who meets the ${threshold()}%+ threshold or can act for the company. We already brought over people from Nymcard.</p></div>${badge(`${threshold()}%+ or more`,isHighRisk()?'warn':'info')}</div>${sectionProgress(d,t)}<div class="notice ${isHighRisk()?'warn':'success'}"><strong>Please add shareholders with ${threshold()}% or more.</strong> We are not asking you to enter the exact percentage in this MVP.</div><p class="micro" style="margin-top:14px">Keep the cards as-is if the details are still correct. Use Add another if someone is missing.</p>${state.shareholders.map((s,i)=>shareholderCard(s,i)).join('')}<button class="add-card" onclick="addShareholder()">+ Add another shareholder / director</button></section>`}
function docStatus(title, sub, status='valid'){
  const cls=status==='expired'?'expired':status==='expiring'?'expiring':status==='updated'?'updated':'';
  const action=status==='expired'?'Expired':status==='expiring'?'Expires soon':status==='updated'?'Updated':'On file';
  const b=status==='expired'?'danger':status==='expiring'?'cond':status==='updated'?'done':'nym';
  const alert=status==='expired'?'<div class="doc-alert expired">Expired. This must be replaced before final processing.</div>':status==='expiring'?'<div class="doc-alert">Approaching expiry. We will notify you to update it, but it is not mandatory yet.</div>':'';
  return {cls,action,b,alert};
}
function docRow(icon,title,sub,status='valid',id=''){
  const d=docStatus(title,sub,status);
  const updateBtn=id?`<button onclick="updateExistingDoc('${id}','${esc(title)}')">Update</button>`:'';
  const updatedCopy=status==='updated'?'<div class="doc-alert">Old Nymcard copy retained as metadata. New Ruya upload is now the current source of truth.</div>':'';
  return `<div class="doc-row ${d.cls}"><div class="doc-ico">${icon}</div><div><div class="doc-title">${title}</div><div class="doc-sub">${sub}</div>${d.alert}${updatedCopy}<div class="doc-sub" style="margin-top:5px">Nymcard copy: metadata only · no preview/download</div></div><div class="doc-actions">${badge(d.action,d.b)}<button class="secondary" onclick="viewExistingDoc('${esc(title)}','${esc(sub)}','${status}')">View metadata</button>${updateBtn}</div></div>`
}

function stepDocuments(){
  const [d,t]=completeForStep(3);
  const shareholderDocs=state.shareholders.filter(s=>s.kind==='individual').map((s,idx)=>{
    const isUae=s.uae;
    const status=s.docUpdated?'updated':(s.idUpload?'valid':'expired');
    return docRow(isUae?'🪪':'📕',`${isUae?'Emirates ID':'Passport'} — ${esc(s.name||'Stakeholder')}`,isUae?`Expiry ${esc(s.eidExpiry||'not set')} · front and back copy`:`Expiry ${esc(s.passportExpiry||'not set')} · passport copy`,status,`id${idx}`)
  }).join('');
  return `<section class="form-section"><div class="section-title"><div><h1>Documents</h1><p>View what came from Nymcard, update old files, and add any new documents for Ruya.</p></div>${badge('Source of truth','new')}</div>${sectionProgress(d,t)}
  <div class="source-truth-panel"><div class="source-truth-item"><strong>Who can access documents?</strong> Initiators and Org Admins can view Ruya uploads. Nymcard-carried documents are shown as metadata only.</div><div class="source-truth-item"><strong>How updates work</strong> Existing files are updated through Documents & Certificates. Newly added files can be viewed, deleted, and re-uploaded here.</div><div class="source-truth-item"><strong>Version handling</strong> If a Nymcard document is replaced, keep the old metadata and add the new Ruya upload as current source of truth.</div><div class="source-truth-item"><strong>Expiry handling</strong> Near-expiry documents trigger reminders only. Expired documents must be replaced before final processing.</div></div>
  <div class="notice warn" style="margin-top:0"><strong>Document rule for V0:</strong> we notify users when a document is close to expiry, but we do not block them from continuing. We only need to ensure expired documents are replaced before the application is finally processed.</div>
  <div class="group"><div class="group-head"><h3>Already available from Nymcard</h3>${badge('View or update','nym')}</div><p class="micro">These are listed for transparency. Use “Update” if the file is outdated or a newer version is available.</p><div class="doc-list">
    ${docRow('📄','Trade licence','Licence no. '+esc(state.company.tlNo)+' · expires '+esc(state.company.tlExpiry),state.docs.tlUpdate?'updated':'expiring','tl')}
    ${docRow('📋','MOA / AOA','Shows management appointment and shareholding split',state.docs.moaUpdate?'updated':'valid','moa')}
    ${shareholderDocs}
  </div></div>
  <hr class="divider"><div class="group"><div class="group-head"><h3>Add new documents</h3>${badge('Upload when available','req')}</div><p class="micro">You can upload, view, delete, and re-upload newly added files. Missing required files stay flagged on review but do not block movement through the form.</p>${upload('bank','Upload 6-month bank statement or latest financial statements','PDF preferred · one document is enough',state.docs.bank)}${hasPoaAuthority()?`<div style="margin-top:12px">${upload('poa','Upload Power of Attorney','Required because you selected that you have POA from the company',state.docs.poa)}</div>`:''}${hasCompanyShareholder()?`<div style="margin-top:12px">${upload('companyTl','Company shareholder trade licence','Because one shareholder is a company',state.docs.companyTl)}</div>`:''}</div>
  <hr class="divider"><div class="group"><div class="group-head"><h3>A couple of quick checks</h3>${badge('Only if applies','cond')}</div><p class="micro">Answer these so we only show documents that match your company.</p><div class="shade-box"><div class="group-head"><h3>Is your company regulated?</h3>${badge('Conditional','cond')}</div>${toggleButtons('docs.regQ','Yes','No')}${state.docs.regQ===true?`<div style="margin-top:14px">${upload('reg','Upload regulatory licence / approval','For financial institutions, insurance companies or other regulated businesses',state.docs.reg)}</div>`:''}</div><div class="shade-box"><div class="group-head"><h3>Does your company have a parent organisation?</h3>${badge('Conditional','cond')}</div><p class="micro" style="margin-top:0">A parent organisation means another company or group entity owns or controls this company.</p>${toggleButtons('docs.parentQ','Yes','No')}${state.docs.parentQ===true?`<div class="shade-box nested"><div style="margin-bottom:14px">${upload('parent','Upload parent organisation ownership document','Org chart or ownership chain to final owners',state.docs.parent)}</div><div class="group-head"><h3>Is the parent organisation outside the UAE?</h3>${badge('Nested question','cond')}</div>${toggleButtons('docs.foreignQ','Yes, outside UAE','No, UAE parent')}${state.docs.foreignQ===true?`<div style="margin-top:14px">${upload('inc','Upload Certificate of Incumbency / Share Register','Authenticated copy for a foreign parent',state.docs.inc)}</div>`:''}</div>`:''}</div></div></section>`
}
function stepReview(){
  const [d,t]=completeForStep(4);
  const activitySummary=state.company.activitiesAnswer===true?'Yes — one or more listed activities apply':state.company.activitiesAnswer===false?'No — none of the listed activities apply':'Not set';
  const initiatorDoc=state.initiator.uaeCitizen===true?(state.initiator.idChoice||'Not set'):'Passport';
  const relationshipSummary=state.initiator.role||'Not set';
  const consentSummary=directConsentPath()?(state.initiator.consent?'Captured':'Missing'):`To be requested from ${state.initiator.signerName||'authorised signatory'}`;
  return `<section class="form-section"><div class="section-title"><div><h1>Review application</h1><p>One last check. Review what is filled. Missing items remain visible and can be followed up after submission.</p></div>${badge('Final step','done')}</div>${sectionProgress(d,t)}<div class="summary-strip"><div class="summary-tile"><div class="small">Completion</div><div class="big">${Math.round(steps.reduce((sum,_,i)=>{const [dd,tt]=completeForStep(i);return sum+(tt?dd/tt:1)},0)/steps.length*100)}%</div></div><div class="summary-tile"><div class="small">Shareholder threshold</div><div class="big">${threshold()}%+</div></div><div class="summary-tile"><div class="small">Consent path</div><div class="big">${consentPathLabel()}</div></div></div><div class="notice warn"><strong>Missing items are not blocked here.</strong> They remain visible as Missing / Not set and can be completed later or handled by Ops after submission.</div><div class="review-card"><div class="review-head"><span>Initiator</span><button onclick="state.step=0;render()">Edit</button></div><div class="review-body"><div class="review-grid"><div class="review-item"><div class="k">Name</div><div class="v">${esc(state.initiator.first)} ${esc(state.initiator.last)}</div></div><div class="review-item"><div class="k">Relationship</div><div class="v">${esc(relationshipSummary)}</div></div><div class="review-item"><div class="k">POA?</div><div class="v">${state.initiator.hasPoa===true?'Yes':state.initiator.hasPoa===false?'No':'Not applicable'}</div></div><div class="review-item"><div class="k">UAE citizen?</div><div class="v">${state.initiator.uaeCitizen===true?'Yes':state.initiator.uaeCitizen===false?'No':'Not set'}</div></div><div class="review-item"><div class="k">Identity document</div><div class="v">${esc(initiatorDoc)} · ${state.initiator.idUpload?'Uploaded':'Missing'}</div></div><div class="review-item"><div class="k">Consent</div><div class="v">${esc(consentSummary)}</div></div></div></div></div><div class="review-card"><div class="review-head"><span>Company</span><button onclick="state.step=1;render()">Edit</button></div><div class="review-body"><div class="review-grid"><div class="review-item"><div class="k">Company</div><div class="v">${esc(state.company.name)}</div></div><div class="review-item"><div class="k">Trade licence</div><div class="v">${esc(state.company.tlNo)}</div></div><div class="review-item"><div class="k">Operating address</div><div class="v">${state.company.opSame?'Same as trade licence':esc(state.company.opAddress||'Not set')}</div></div><div class="review-item"><div class="k">Listed activities</div><div class="v">${esc(activitySummary)}</div></div></div></div></div><div class="review-card"><div class="review-head"><span>Shareholders & directors</span><button onclick="state.step=2;render()">Edit</button></div><div class="review-body"><div class="notice success" style="margin-top:0"><strong>Threshold applied:</strong> ${threshold()}% or more.</div><div class="review-grid">${state.shareholders.map(s=>`<div class="review-item"><div class="k">${esc(s.name||'Unnamed')}</div><div class="v">${esc(s.role||s.kind)} · ${s.kind==='company'?'Company':'Individual'}</div></div>`).join('')}</div></div></div><div class="review-card"><div class="review-head"><span>Documents</span><button onclick="state.step=3;render()">Edit</button></div><div class="review-body"><div class="notice warn" style="margin-top:0"><strong>Expiry rule:</strong> near-expiry documents are reminders only; expired documents are replaced before final processing. Nymcard copies remain metadata-only.</div><div class="review-grid"><div class="review-item"><div class="k">Bank / financial statement</div><div class="v">${state.docs.bank?'Uploaded':'Missing'}</div></div><div class="review-item"><div class="k">Power of Attorney</div><div class="v">${hasPoaAuthority()?(state.docs.poa?'Uploaded':'Missing'):'Not applicable'}</div></div><div class="review-item"><div class="k">Regulatory licence</div><div class="v">${state.docs.regQ===true?(state.docs.reg?'Uploaded':'Missing'):'Not applicable'}</div></div><div class="review-item"><div class="k">Parent organisation</div><div class="v">${state.docs.parentQ===true?(state.docs.parent?'Uploaded':'Missing'):'Not applicable'}</div></div><div class="review-item"><div class="k">Foreign parent certificate</div><div class="v">${state.docs.foreignQ===true?(state.docs.inc?'Uploaded':'Missing'):'Not applicable'}</div></div></div></div></div>${directConsentPath()?`<label class="consent"><input type="checkbox" ${state.initiator.consent?'checked':''} onchange="set('initiator.consent',this.checked)"><span>${isAuthorisedSignatory()?'I am the authorised signatory':'I have Power of Attorney'} and I consent to submit this Ruya Business Banking application for ${esc(state.company.name)}.</span></label>`:`<div class="notice warn"><strong>Consent will be routed before Ruya submission.</strong> We will send a consent popup to ${esc(state.initiator.signerName||'the authorised signatory')} (${esc(state.initiator.signerEmail||'email not set')}). Until consent is captured, the Business Account page shows “Awaiting Authorised Signatory consent”.</div>`}<label class="consent"><input type="checkbox" ${state.review.declaration?'checked':''} onchange="set('review.declaration',this.checked)"><span>I confirm the details shared here are accurate and complete. I agree that Alaan and Ruya can use this information and the carried-over Nymcard documents to process the application.</span></label></section>`
}

function doneView(){
  if(usesRoutedConsent()){
    return `<div class="flow-main"><div class="complete"><div class="big-check">⌛</div><h1>Awaiting authorised signatory consent</h1><p>The application has been prepared, but it will not be sent to Ruya until ${esc(state.initiator.signerName||'the authorised signatory')} provides consent. Ask them to log in to Alaan and approve the popup. If they are not an Alaan user, Ops will onboard them as an Organisation Admin for MVP.</p><button class="btn btn-primary" onclick="showModal('Contact Support','Support can help if the authorised signatory did not receive the consent prompt or needs to be added as an Organisation Admin.')">Contact Support</button></div></div>`
  }
  return `<div class="flow-main"><div class="complete"><div class="big-check">✓</div><h1>Submitted and under verification</h1><p>Your Ruya Business Banking application has been submitted. Verification usually takes 2 to 5 business days. Any missing required items or expired documents remain visible for Ops follow-up before final processing.</p><button class="btn btn-primary" onclick="showModal('Contact Support','Support can help with document questions, consent issues, or application status.')">Contact Support</button></div></div>`
}

function confetti(){const colors=['#5d43a3','#9f84e8','#24a865','#ff9b45','#0b0e38'];for(let i=0;i<60;i++){setTimeout(()=>{const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.width=(6+Math.random()*8)+'px';c.style.height=(6+Math.random()*8)+'px';c.style.borderRadius=Math.random()>.55?'50%':'2px';c.style.background=colors[Math.floor(Math.random()*colors.length)];c.style.animationDuration=(2+Math.random()*2)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),4300)},i*28)}}
render();
</script>
</body>
